<main>
      <section class="hero">
        <div class="wrap">
          <div class="eyebrow">Post detail</div>
          <p><a class="text-link" href="./blog.html">Back to blog</a></p>
          <h1 data-post-title>Loading post...</h1>
          <p class="hero__lede" data-post-summary></p>
          <div class="tag-row" data-post-tags></div>
        </div>
      </section>

      <section class="section">
        <div class="wrap page-layout">
          <article class="article-shell hero__panel" data-post-article></article>

          <aside class="article-aside">
            <section class="surface-panel">
              <div class="eyebrow">Post metadata</div>
              <div class="meta-list">
                <div>
                  <strong>Published</strong>
                  <span data-post-date></span>
                </div>
                <div>
                  <strong>Location</strong>
                  <span data-post-location></span>
                </div>
                <div>
                  <strong>Status</strong>
                  <span data-post-status></span>
                </div>
              </div>
            </section>

            <section class="surface-panel" data-post-review hidden></section>

            <section class="surface-panel">
              <div class="eyebrow">Structured notes</div>
              <div class="record-list" data-post-records></div>
            </section>
          </aside>
        </div>
      </section>

      <section class="section">
        <div class="wrap section__head">
          <div>
            <div class="eyebrow">More posts</div>
            <h2>Related posts</h2>
          </div>
        </div>
        <div class="wrap card-grid" data-post-related></div>
      </section>

      <section class="section">
        <div class="wrap">
          <section class="surface-panel" data-comment-panel></section>
        </div>
      </section>
    </main>
